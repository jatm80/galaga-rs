services:
  galaga:
    build: .
    # image: galaga-fui:latest
    # host networking avoids Docker's veth bridge, which this host's kernel
    # (7.1.3-arch1-2) can't create — the `veth` module is missing. nginx then
    # listens on the host's port 80 directly: http://localhost
    # Once `veth` is available, delete `network_mode` and re-enable `ports`.
    # network_mode: host
    ports:
      - "8080:80"
    restart: unless-stopped
