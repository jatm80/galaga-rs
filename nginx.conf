server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # nginx 1.27's bundled mime.types already maps .wasm -> application/wasm,
    # which the runtime requires to boot.

    gzip on;
    gzip_types application/javascript application/wasm application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
